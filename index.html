<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container" id="left">
        <div class="container" id="logo-container">
            <img src="./odin-lined.png" alt="The Odin Project logo" height="508" width="380" id="logo">

            <h1>ODIN</h1>
        </div>

        <p id="photo-credit">Photo by <a href="https://unsplash.com/@haliewestphoto" target="_blank" rel="noreferrer">Halie West</a> on <a href="https://unsplash.com/" target="_blank" rel="noreferrer">Unsplash</a></p>
    </div>
    <div class="container" id="right">
        <div id="hero">
            This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams.<br>
            Sign up <em>now</em> to get started.<br>
            You <em>know</em> you want to.
        </div>
        <div class="container" id="form-container">
            <p>Let's do this!</p>

            <form action="" method="post" name="sign-up-form">
                <label for="user-first-name">FIRST NAME</label>
                <input type="text" id="user-first-name" name="user-first-name">

                <label for="user-last-name">LAST NAME</label>
                <input type="text" id="user-last-name" name="user-last-name">
                
                <label for="email">EMAIL</label>
                <input type="email" id="email" name="email">
                
                <label for="user-phone-number">PHONE NUMBER</label>
                <input type="tel" id="user-phone-number" name="user-phone-number">
                
                <label for="user-password">PASSWORD</label>
                <input type="password" id="user-password" name="user-password">
                
                <label for="user-confirm-password">CONFIRM PASSWORD</label>
                <input type="password" id="user-confirm-password" name="user-confirm-password">
            </form>
        </div>
        <div class="container" id="button-container">
            <button type="submit" form="sign-up-form">Create Account</button>

            <p>Already have an account? Login</p>
        </div>
    </div>
</body>
</html>
